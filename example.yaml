esphome:
  name: countrymod-rv-ac
  friendly_name: Countrymod RV AC

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

external_components:
  - source:
      type: local
      path: components
    components: [countrymod]

remote_transmitter:
  id: ir_tx
  pin: GPIO4
  carrier_duty_percent: 50%
  non_blocking: true

# Optional receiver for sniffing and optimistic state sync from the handheld remote.
# remote_receiver:
#   id: ir_rx
#   pin:
#     number: GPIO5
#     inverted: true
#     mode:
#       input: true
#       pullup: true
#   dump: lg

climate:
  - platform: countrymod
    id: rv_ac
    name: RV AC
    transmitter_id: ir_tx
    # receiver_id: ir_rx
    feature_as_swing: false
    inter_frame_delay: 110ms

switch:
  - platform: countrymod
    countrymod_id: rv_ac
    type: turbo
    name: RV AC Turbo

  - platform: countrymod
    countrymod_id: rv_ac
    type: night
    name: RV AC Night

  - platform: countrymod
    countrymod_id: rv_ac
    type: feature
    name: RV AC Feature Bit
