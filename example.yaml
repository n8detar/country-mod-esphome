esphome:
  name: countrymod-rv-ac
  friendly_name: Countrymod RV AC
  devices:
    - id: rv_ac_device
      name: RV AC

esp32:
  board: esp32dev
  framework:
    type: esp-idf

logger:

external_components:
  - source: github://n8detar/country-mod-esphome@main
    components: [countrymod]

remote_transmitter:
  id: ir_tx
  pin: GPIO4
  carrier_duty_percent: 50%
  non_blocking: true

# Optional receiver for sniffing and optimistic state sync from the handheld remote.
# remote_receiver:
#   id: ir_rx
#   pin:
#     number: GPIO5
#     inverted: true
#     mode:
#       input: true
#       pullup: true
#   dump: lg

climate:
  - platform: countrymod
    id: rv_ac
    name: Climate
    device_id: rv_ac_device
    transmitter_id: ir_tx
    # receiver_id: ir_rx
    supports_heat: false
    inter_frame_delay: 110ms
    use_power_bit: true

switch:
  - platform: countrymod
    countrymod_id: rv_ac
    type: turbo
    name: Turbo
    device_id: rv_ac_device

  - platform: countrymod
    countrymod_id: rv_ac
    type: night
    name: Night
    device_id: rv_ac_device

  - platform: countrymod
    countrymod_id: rv_ac
    type: negative_ion
    name: Negative Ion
    device_id: rv_ac_device
    disabled_by_default: true

  - platform: countrymod
    countrymod_id: rv_ac
    type: eco
    name: Eco
    device_id: rv_ac_device

  - platform: countrymod
    countrymod_id: rv_ac
    type: auxiliary
    name: Auxiliary Function
    device_id: rv_ac_device
    disabled_by_default: true

button:
  - platform: countrymod
    countrymod_id: rv_ac
    type: display
    name: Display
    device_id: rv_ac_device

  - platform: countrymod
    countrymod_id: rv_ac
    type: view_voltage
    name: View Voltage
    device_id: rv_ac_device

  - platform: countrymod
    countrymod_id: rv_ac
    type: light
    name: Light
    device_id: rv_ac_device
    disabled_by_default: true
